<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云篆 · 道门智慧 MBTI 顾问</title>

<!--
  ═══════════════════════════════════════════════════════════
  云篆 YunZhuan — 道门智慧 MBTI 顾问
  单文件离线 Demo · 双击 index.html 即可运行
  架构：配置 → 数据 → 渲染 → 动效 → 状态机，各模块解耦
  ═══════════════════════════════════════════════════════════
-->

<!-- ============================================================
  模块 1：主题样式体系 <style data-module="theme">
  变量定义、字体回退、全局重置、动画关键帧
  按组件顺序：background → compass → tokens → card → utilities
  视觉铁律：禁用纯白、高饱和现代色，贯穿暗金/朱砂/青铜/竹简
============================================================ -->
<style data-module="theme">
  /* ═══════════════════════════════════════════════════
     CSS Custom Properties
     ═══════════════════════════════════════════════════ */
  :root {
    --bg-deep: #0D0D14;
    --gold-dark: #8B7355;
    --gold: #B8860B;
    --gold-light: #DAA520;
    --cinnabar: #C41E3A;
    --cinnabar-light: #E23D3D;
    --bronze: #6B3A2A;
    --bronze-light: #8B5A3C;
    --bamboo: #F0EAD6;
    --bamboo-dark: #E0D5C0;
    --ink: #2C1810;
    --ink-light: #4A3728;
    --font-title: 'LiSu', '楷体', 'KaiTi', 'STKaiti', serif;
    --font-body: 'SimSun', '宋体', 'STSong', 'FangSong', '仿宋', serif;
    --easing: cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* ═══════════════════════════════════════════════════
     全局重置
     ═══════════════════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: var(--font-body);
    color: var(--bamboo);
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ═══════════════════════════════════════════════════
     背景星图
     ═══════════════════════════════════════════════════ */
  #starfield {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star-layer {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    animation: starRotate var(--speed) linear infinite;
  }

  .star-layer:nth-child(2) { animation-direction: reverse; }
  .star-layer:nth-child(3) { animation-direction: reverse; }

  @keyframes starRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  /* ═══════════════════════════════════════════════════
     主舞台
     ═══════════════════════════════════════════════════ */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
  }

  /* ═══════════════════════════════════════════════════
     罗盘行（箭头 + 罗盘 + 箭头）
     ═══════════════════════════════════════════════════ */
  .compass-row {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  /* ═══════════════════════════════════════════════════
     罗盘组件
     ═══════════════════════════════════════════════════ */
  .compass {
    position: relative;
    width: 300px;
    height: 300px;
    flex-shrink: 0;
    order: 1;
  }

  .compass-ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    pointer-events: none;
  }

  .compass-ring--outer {
    width: 300px;
    height: 300px;
    margin: -150px 0 0 -150px;
    border: 2px solid var(--gold-dark);
    box-shadow:
      0 0 30px rgba(184, 134, 11, 0.12),
      inset 0 0 30px rgba(184, 134, 11, 0.06);
  }

  .compass-ring--mid {
    width: 260px;
    height: 260px;
    margin: -130px 0 0 -130px;
    border: 1px dashed var(--bronze-light);
    opacity: 0.5;
  }

  .compass-ring--inner {
    width: 220px;
    height: 220px;
    margin: -110px 0 0 -110px;
    border: 1px solid var(--bronze);
    opacity: 0.4;
  }

  /* 中心文字圆 */
  .compass-center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 170px;
    height: 170px;
    margin: -85px 0 0 -85px;
    border-radius: 50%;
    background: radial-gradient(circle at 45% 40%, #1a1a2e, var(--bg-deep) 70%);
    border: 1px solid rgba(139, 115, 85, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-title);
    font-size: 48px;
    color: var(--gold-light);
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(218, 165, 32, 0.3);
    transition: color 0.15s ease, text-shadow 0.15s ease;
    z-index: 2;
    overflow: hidden;
  }

  /* 十字准线 */
  .compass-center::before,
  .compass-center::after {
    content: '';
    position: absolute;
    background: var(--bronze);
    opacity: 0.2;
  }

  .compass-center::before {
    width: 1px;
    height: 60%;
  }

  .compass-center::after {
    width: 60%;
    height: 1px;
  }

  /* 文字切换动画 */
  .compass-center.text-switching {
    color: var(--gold);
    text-shadow: 0 0 30px rgba(218, 165, 32, 0.5);
  }

  /* ═══════════════════════════════════════════════════
     八卦爻符
     ═══════════════════════════════════════════════════ */
  .trigram {
    position: absolute;
    top: calc(50% + var(--ty));
    left: calc(50% + var(--tx));
    transform: translate(-50%, -50%);
    font-family: var(--font-title);
    font-size: 18px;
    color: var(--gold-dark);
    pointer-events: none;
    text-shadow: 0 0 8px rgba(184, 134, 11, 0.2);
  }

  /* ═══════════════════════════════════════════════════
     青铜箭头
     ═══════════════════════════════════════════════════ */
  .arrow {
    width: 0;
    height: 0;
    cursor: pointer;
    transition: filter 0.2s var(--easing), opacity 0.2s var(--easing);
    flex-shrink: 0;
  }

  .arrow--left {
    order: 0;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-right: 28px solid var(--bronze-light);
    filter: drop-shadow(0 0 4px rgba(139, 90, 60, 0.4));
  }

  .arrow--right {
    order: 2;
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
    border-left: 28px solid var(--bronze-light);
    filter: drop-shadow(0 0 4px rgba(139, 90, 60, 0.4));
  }

  .arrow:hover {
    filter: drop-shadow(0 0 12px rgba(139, 90, 60, 0.85));
  }

  .arrow:active {
    opacity: 0.7;
  }

  /* ═══════════════════════════════════════════════════
     环形全览面板（预留，Step 2 未完成部分）
     ═══════════════════════════════════════════════════ */

  /* ═══════════════════════════════════════════════════
     令牌组
     ═══════════════════════════════════════════════════ */
  #tokens-container {
    display: flex;
    gap: 24px;
    justify-content: center;
    align-items: center;
  }

  .token {
    width: 80px;
    height: 180px;
    background: linear-gradient(
      to bottom,
      rgba(139, 115, 85, 0.18),
      rgba(139, 115, 85, 0.04)
    );
    border: 1px solid rgba(139, 115, 85, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    font-family: var(--font-title);
    font-size: 32px;
    color: var(--cinnabar);
    letter-spacing: 8px;
    cursor: pointer;
    animation: tokenFloat var(--float-duration) ease-in-out infinite;
    animation-delay: var(--float-delay);
    transition:
      transform 0.35s var(--easing),
      opacity 0.35s var(--easing),
      box-shadow 0.35s var(--easing),
      color 0.35s var(--easing),
      text-shadow 0.35s var(--easing),
      border-color 0.35s var(--easing);
    text-shadow: 0 0 6px rgba(196, 30, 58, 0.25);
  }

  .token:hover {
    color: var(--cinnabar-light);
    text-shadow:
      0 0 12px rgba(196, 30, 58, 0.85),
      0 0 28px rgba(196, 30, 58, 0.5);
    box-shadow:
      0 0 18px rgba(196, 30, 58, 0.25),
      0 0 36px rgba(196, 30, 58, 0.12),
      inset 0 0 18px rgba(196, 30, 58, 0.08);
    border-color: rgba(196, 30, 58, 0.5);
  }

  /* 选中令牌：飞升中央 */
  .token--selected {
    animation: none;
    z-index: 50;
    transition:
      transform 0.8s var(--easing),
      opacity 0.8s var(--easing),
      box-shadow 0.35s var(--easing),
      color 0.35s var(--easing),
      text-shadow 0.35s var(--easing),
      border-color 0.35s var(--easing);
    color: var(--cinnabar-light);
    text-shadow:
      0 0 12px rgba(196, 30, 58, 0.85),
      0 0 28px rgba(196, 30, 58, 0.5);
    box-shadow:
      0 0 18px rgba(196, 30, 58, 0.25),
      0 0 36px rgba(196, 30, 58, 0.12),
      inset 0 0 18px rgba(196, 30, 58, 0.08);
    border-color: rgba(196, 30, 58, 0.5);
  }

  /* 非选中令牌：淡出 */
  .token--dimmed {
    animation: none;
    opacity: 0;
    transition: opacity 0.8s var(--easing);
    pointer-events: none;
  }

  @keyframes tokenFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(calc(-1 * var(--float-amp))); }
  }

  /* ═══════════════════════════════════════════════════
     解读卡片（预留，Step 4 实现）
     ═══════════════════════════════════════════════════ */

  /* ═══════════════════════════════════════════════════
     粒子层 — 金色光点爆发
     ═══════════════════════════════════════════════════ */
  .particle {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--gold-light);
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    box-shadow:
      0 0 6px var(--gold-light),
      0 0 18px rgba(218, 165, 32, 0.5);
    animation: particleBurst 0.8s var(--easing) forwards;
  }

  /* ═══════════════════════════════════════════════════
     粒子爆发关键帧
     ═══════════════════════════════════════════════════ */
  @keyframes particleBurst {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--px), var(--py)) scale(0.2); opacity: 0; }
  }

  /* ═══════════════════════════════════════════════════
     观象卡片（Step 4）— 竹简纹理 + 打字机正文
     ═══════════════════════════════════════════════════ */
  .reading-card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    width: min(520px, 88vw);
    max-height: min(420px, 70vh);
    z-index: 60;
    background-color: var(--bamboo);
    background-image:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 29px,
        rgba(44, 24, 16, 0.05) 29px,
        rgba(44, 24, 16, 0.05) 30px
      ),
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 40px,
        rgba(44, 24, 16, 0.03) 40px,
        rgba(44, 24, 16, 0.03) 41px
      );
    border: 2px solid var(--ink-light);
    border-radius: 3px;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.65),
      0 0 0 1px rgba(44, 24, 16, 0.15),
      inset 0 1px 0 rgba(240, 234, 214, 0.12);
    transition: opacity 0.5s var(--easing), transform 0.5s var(--easing);
  }

  .reading-card--visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }

  .card-tag {
    font-family: var(--font-title);
    font-size: 20px;
    color: var(--cinnabar);
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(196, 30, 58, 0.2);
    border-bottom: 1px solid rgba(44, 24, 16, 0.12);
    padding-bottom: 12px;
  }

  .card-time {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink-light);
    letter-spacing: 2px;
    min-height: 1.4em;
  }

  .card-text {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--ink);
    line-height: 1.9;
    letter-spacing: 1px;
    flex: 1;
    overflow-y: auto;
    min-height: 3em;
    scrollbar-width: thin;
    scrollbar-color: rgba(44, 24, 16, 0.2) transparent;
  }

  .card-text::-webkit-scrollbar {
    width: 4px;
  }

  .card-text::-webkit-scrollbar-thumb {
    background: rgba(44, 24, 16, 0.2);
    border-radius: 2px;
  }

  .card-hint {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink-light);
    text-align: center;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 1s var(--easing);
    border-top: 1px solid rgba(44, 24, 16, 0.08);
    padding-top: 12px;
  }

  .card-hint--visible {
    opacity: 1;
  }

  /* ═══════════════════════════════════════════════════
     无障碍
     ═══════════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    .star-layer { animation: none !important; }
    .compass-center { transition: none !important; }
    .arrow { transition: none !important; }
    .token { animation: none !important; }
    .particle { display: none !important; }
    .token--selected { animation: none !important; transition: none !important; }
    .token--dimmed { animation: none !important; opacity: 0 !important; }
    .reading-card { transition: none !important; opacity: 0 !important; }
    .reading-card--visible { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }
    .card-hint { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
  舞台结构（对应仪式五幕：入境→问道→启卦→观象→归真）
═══════════════════════════════════════════════════════════ -->

<!-- 背景星图层 -->
<div id="starfield"></div>

<!-- 主舞台 -->
<div id="stage">
  <!-- 入境：罗盘区域（八卦盘 + 中心类型文字 + 左右青铜箭头） -->
  <!-- 问道：六张符箓令牌（浮动 + 悬停光晕） -->
  <!-- 启卦：粒子消散层（JS 动态生成金色光点） -->
  <!-- 观象：解读卡片（竹简纹理 + 打字机正文 + 时辰行） -->
  <!-- 归真：点击空白区域，全部淡出复位 -->
</div>

<!-- ============================================================
  模块 2：配置区 <script data-module="config">
  全局常量：罗盘转速、打字速度、粒子数量、浮动幅度等
  令牌列表 TOKENS（固定六字）
  MBTI 类型列表 MBTI_TYPES（16 种）
  编辑此区域即可调整交互参数，无需触碰逻辑代码
============================================================ -->
<script data-module="config">
  /* ═══════════════════════════════════════════════════
     全局常量
     ═══════════════════════════════════════════════════ */
  const COMPASS_SPEED = 30;
  const PARTICLE_COUNT = 20;
  const TYPEWRITER_SPEED_TEXT = 50;
  const TYPEWRITER_SPEED_TIME = 80;
  const TOKEN_FLOAT_AMPLITUDE = 6;

  /* ═══════════════════════════════════════════════════
     令牌列表（六字固定）
     ═══════════════════════════════════════════════════ */
  const TOKENS = ['迷途', '坎', '执', '散', '渊', '生'];

  /* ═══════════════════════════════════════════════════
     MBTI 16 型
     ═══════════════════════════════════════════════════ */
  const MBTI_TYPES = [
    'INFP', 'INFJ', 'INTJ', 'ENFP',
    'ENFJ', 'ENTJ', 'ESFP', 'ESFJ',
    'ESTP', 'ESTJ', 'ISFP', 'ISFJ',
    'ISTP', 'ISTJ', 'INTP', 'ENTP'
  ];
  const DEFAULT_MBTI = 'INFP';

  /* ═══════════════════════════════════════════════════
     星图参数
     ═══════════════════════════════════════════════════ */
  const STAR_LAYERS = [
    { count: 120, size: 1, blur: 1, opacity: 0.25, speed: 120 },
    { count: 60,  size: 2, blur: 2, opacity: 0.40, speed: 180 },
    { count: 25,  size: 2, blur: 3, opacity: 0.55, speed: 240 }
  ];

  /* ═══════════════════════════════════════════════════
     八卦爻符字符
     ═══════════════════════════════════════════════════ */
  const TRIGRAMS = ['☰', '☱', '☲', '☳', '☴', '☵', '☶', '☷'];
</script>

<!-- ============================================================
  模块 3：数据层 <script data-module="data">
  核心对象 TOKEN_DATA，按 类型 > 令牌 > [{text, time}] 存储
  辅助函数：
    getReading(mbti, token) — 随机抽取 + 防重复
    resetSessionHistory()   — 归真时清除记录
  编辑此区域即可更新全部文案，保持格式严格一致
============================================================ -->
<script data-module="data">
  /* ═══════════════════════════════════════════════════
     MBTI 类型标签（中文雅号）
     ═══════════════════════════════════════════════════ */
  var TYPE_TAGS = {
    'INFP': '逍遥散人',
    'INTJ': '弈天者',
    'INFJ': '渡人舟',
    'ENFP': '逐风客'
  };

  /* ═══════════════════════════════════════════════════
     TOKEN_DATA — 4类型×6令牌×2变体 = 48组
     ═══════════════════════════════════════════════════ */
  var TOKEN_DATA = {
    "INFP": {
      "迷途": [
        { text: "雾中有路，只是眼看不见。我闭上眼，用脚底去听——听那最细的根须如何选择泥土的方向。", time: "卯时初刻 · 晨露未晞" },
        { text: "迷途本身或许就是归途。何必急着走出这片森林？林深处，才有别人不曾见过的月光。", time: "亥时三刻 · 月满西楼" }
      ],
      "坎": [
        { text: "水遇石则绕，绕不过便蓄成一潭。潭深了，反而照见天光。我的柔软，原是最韧的铠甲。", time: "午时初刻 · 云雾初开" },
        { text: "我筑了一座水晶宫，晶莹剔透，却一碰就碎。外面的石子飞来时，我分不清哪个是恶意，哪个只是风。", time: "申时三刻 · 暮鼓声远" }
      ],
      "执": [
        { text: "手里攥着一颗种子，别人说干瘪了，我偏要等它发芽。十年不长，我便等二十年。这不是固执，是信。", time: "辰时三刻 · 风起萍末" },
        { text: "我守着心里的那盏灯，生怕它灭了。可我忘了——握得太紧，手心会出汗，灯火反而会溺死在掌纹里。", time: "子时初刻 · 万籁俱寂" }
      ],
      "散": [
        { text: "蒲公英散了，每一朵都带着整棵植株的魂。我不必聚在一起才有意义——飘到哪儿，哪儿就是归处。", time: "巳时初刻 · 云淡风轻" },
        { text: "我把心掰成许多块分出去，收回来时才发现——没有人分给我他们的。空着手站在人群里，比独处更冷。", time: "戌时三刻 · 归鸟入林" }
      ],
      "渊": [
        { text: "静水深流，表面不见波澜，底下却藏着暗涌与虹彩。你只看我一眼便走，自然错过了万丈之下的奇观。", time: "丑时初刻 · 星垂平野" },
        { text: "我往心里挖了很深的井，本想取水，却挖出了从未见过的影子。井太深了，有时连自己都听不见自己的回声。", time: "酉时三刻 · 暮色四合" }
      ],
      "生": [
        { text: "蚕以为自己要死了，结果长出了翅膀。我每一次以为走到了尽头，回头看，不过是蜕了一层旧皮。", time: "寅时三刻 · 东方既白" },
        { text: "种子裂开的时候是疼的，但它不裂开，便永远不知道自己是一棵树。我正在裂开的路上，不知道还要疼多久。", time: "未时初刻 · 水落石出" }
      ]
    },
    "INTJ": {

  /* ═══════════════════════════════════════════════════
     会话历史 + 防重复抽取
     ═══════════════════════════════════════════════════ */
  var sessionHistory = {};

  function getReading(mbti, token) {
    var typeData = TOKEN_DATA[mbti];
    if (!typeData) return null;
    var tokenEntries = typeData[token];
    if (!tokenEntries || tokenEntries.length === 0) return null;

    var key = mbti + '_' + token;
    if (!sessionHistory[key]) sessionHistory[key] = [];

    var shown = sessionHistory[key];
    var available = [];
    for (var i = 0; i < tokenEntries.length; i++) {
      if (shown.indexOf(i) === -1) available.push(tokenEntries[i]);
    }

    if (available.length === 0) {
      sessionHistory[key] = [];
      shown = sessionHistory[key];
      available = tokenEntries.slice();
    }

    var pick = available[Math.floor(Math.random() * available.length)];
    var idx = tokenEntries.indexOf(pick);
    shown.push(idx);

    return pick;
  }

  function resetSessionHistory() {
    sessionHistory = {};
  }
</script>

<!-- ============================================================
  模块 4：视觉渲染引擎 <script data-module="render">
  所有 DOM 创建与样式操作
    createStarfield()      — 多层星点动画
    renderCompass()        — 罗盘纹样 + 中心文字
    renderRingPanel()      — 16 型环形全览
    renderTokens()         — 令牌浮动
    createReadingCard()    — 竹简卡片
  环形全览坐标算法：将 16 个选项均匀分布在圆周上，
  每个选项的 (x, y) = (cx + R*cos(θ), cy + R*sin(θ))
============================================================ -->
<script data-module="render">
  /* ═══════════════════════════════════════════════════
     背景星图
     ═══════════════════════════════════════════════════ */
  function createStarfield() {
    const container = document.getElementById('starfield');
    if (!container) return;

    STAR_LAYERS.forEach(function (layer) {
      var div = document.createElement('div');
      div.className = 'star-layer';
      div.style.setProperty('--speed', layer.speed + 's');

      var shadows = [];
      for (var i = 0; i < layer.count; i++) {
        var x = (Math.random() * 800 - 400).toFixed(1);
        var y = (Math.random() * 800 - 400).toFixed(1);
        shadows.push(x + 'px ' + y + 'px ' + layer.blur + 'px ' + layer.size + 'px rgba(218,165,32,' + layer.opacity + ')');
      }
      div.style.boxShadow = shadows.join(', ');
      div.style.width = layer.size + 'px';
      div.style.height = layer.size + 'px';

      container.appendChild(div);
    });
  }

  /* ═══════════════════════════════════════════════════
     罗盘组件
     ═══════════════════════════════════════════════════ */
  function renderCompass() {
    var row = document.querySelector('.compass-row');
    if (!row) return;

    /* ── 罗盘容器 ── */
    var compass = document.createElement('div');
    compass.className = 'compass';
    compass.id = 'compass';

    /* ── 三层同心环 ── */
    ['outer', 'mid', 'inner'].forEach(function (tier) {
      var ring = document.createElement('div');
      ring.className = 'compass-ring compass-ring--' + tier;
      compass.appendChild(ring);
    });

    /* ── 八卦爻符（直接计算 x/y 坐标，半径 140px） ── */
    TRIGRAMS.forEach(function (char, i) {
      var span = document.createElement('span');
      span.className = 'trigram';
      span.textContent = char;
      var angle = (i / 8) * 2 * Math.PI;   /* 从顶部顺时针 */
      var tx = (128 * Math.sin(angle)).toFixed(1);
      var ty = (-128 * Math.cos(angle)).toFixed(1);
      span.style.setProperty('--tx', tx + 'px');
      span.style.setProperty('--ty', ty + 'px');
      compass.appendChild(span);
    });

    /* ── 中心文字圆 ── */
    var center = document.createElement('div');
    center.className = 'compass-center';
    center.id = 'mbti-display';
    center.textContent = DEFAULT_MBTI;
    compass.appendChild(center);

    row.appendChild(compass);
  }

  /* ── 箭头按钮 ── */
  function renderArrows() {
    var stage = document.getElementById('stage');
    if (!stage) return;

    var row = document.createElement('div');
    row.className = 'compass-row';

    var left = document.createElement('div');
    left.className = 'arrow arrow--left';
    left.id = 'arrow-left';

    var right = document.createElement('div');
    right.className = 'arrow arrow--right';
    right.id = 'arrow-right';

    row.appendChild(left);
    row.appendChild(right);
    stage.appendChild(row);
  }

  /* ── 令牌组 ── */
  function renderTokens() {
    var stage = document.getElementById('stage');
    if (!stage) return;

    var container = document.createElement('div');
    container.id = 'tokens-container';

    var durations = [3.2, 3.6, 3.0, 3.8, 3.3, 3.5];
    var delays = [0, 0.5, 1.0, 1.5, 0.3, 0.8];

    TOKENS.forEach(function (name, i) {
      var token = document.createElement('div');
      token.className = 'token';
      token.setAttribute('data-token', name);
      token.textContent = name;
      token.style.setProperty('--float-duration', durations[i] + 's');
      token.style.setProperty('--float-delay', delays[i] + 's');
      token.style.setProperty('--float-amp', TOKEN_FLOAT_AMPLITUDE + 'px');
      container.appendChild(token);
    });

    stage.appendChild(container);
  }

  /* ── 环形全览面板（预留） ── */

  /* ═══════════════════════════════════════════════════
     解读卡片 — 竹简卡片 DOM
     返回 { card, timeEl, textEl, hintEl } 引用
     ═══════════════════════════════════════════════════ */
  function createReadingCard(mbti, tokenName, readingData) {
    var existing = document.querySelector('.reading-card');
    if (existing) existing.remove();

    var card = document.createElement('div');
    card.className = 'reading-card';
    card.id = 'reading-card';

    var tag = document.createElement('div');
    tag.className = 'card-tag';
    tag.textContent = mbti + ' · ' + (TYPE_TAGS[mbti] || '');

    var time = document.createElement('div');
    time.className = 'card-time';

    var text = document.createElement('div');
    text.className = 'card-text';

    var hint = document.createElement('div');
    hint.className = 'card-hint';
    hint.textContent = '道法自然，不必执着 · 点击别处再探';

    card.appendChild(tag);
    card.appendChild(time);
    card.appendChild(text);
    card.appendChild(hint);
    document.body.appendChild(card);

    return { card: card, timeEl: time, textEl: text, hintEl: hint };
  }
</script>

<!-- ============================================================
  模块 5：动效控制器 <script data-module="effects">
  纯视觉动效工具，不涉及业务状态
    playParticleBurst(x, y)  — 在指定坐标生成粒子，0.8s 消散
    typewriter(el, text, ms) — 逐字显现，返回 Promise
    fadeIn / fadeOut         — 通用淡入淡出
    moveToCenter / resetPosition — 令牌飞升与归位
============================================================ -->
<script data-module="effects">
  /* ═══════════════════════════════════════════════════
     粒子爆发
     在 (x, y) 坐标生成 PARTICLE_COUNT 个金色粒子，
     随机方向飞行 0.8s 后自动移除 DOM
     ═══════════════════════════════════════════════════ */
  function createParticles(x, y) {
    for (var i = 0; i < PARTICLE_COUNT; i++) {
      var particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';

      var angle = Math.random() * 2 * Math.PI;
      var distance = 60 + Math.random() * 140;
      particle.style.setProperty('--px', (Math.cos(angle) * distance).toFixed(1) + 'px');
      particle.style.setProperty('--py', (Math.sin(angle) * distance).toFixed(1) + 'px');

      document.body.appendChild(particle);
    }

    setTimeout(function () {
      var particles = document.querySelectorAll('.particle');
      for (var i = 0; i < particles.length; i++) {
        particles[i].remove();
      }
    }, 800);
  }

  /* ═══════════════════════════════════════════════════
     打字机效果 — 逐字显现，返回 Promise
     ═══════════════════════════════════════════════════ */
  function typewrite(el, text, speed) {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      el.textContent = text;
      return Promise.resolve();
    }
    return new Promise(function (resolve) {
      el.textContent = '';
      var i = 0;
      var len = text.length;
      function type() {
        if (i >= len) { resolve(); return; }
        el.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed);
      }
      type();
    });
  }

  /* ── 淡入 ── */
  function fadeIn(el, duration) {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      el.style.opacity = '1';
      return Promise.resolve();
    }
    var dur = duration || 300;
    return new Promise(function (resolve) {
      el.style.opacity = '0';
      requestAnimationFrame(function () {
        el.style.transition = 'opacity ' + dur + 'ms var(--easing)';
        el.style.opacity = '1';
        setTimeout(resolve, dur);
      });
    });
  }

  /* ── 淡出 ── */
  function fadeOut(el, duration) {
    var dur = duration || 300;
    return new Promise(function (resolve) {
      el.style.transition = 'opacity ' + dur + 'ms var(--easing)';
      el.style.opacity = '0';
      setTimeout(resolve, dur);
    });
  }
</script>

<!-- ============================================================
  模块 6：交互状态机 <script data-module="app">
  全局状态管理 + 事件绑定 + 主循环
    状态：{ currentMBTI, selectedToken, isCardVisible, sessionHistory }
    事件：
      罗盘左右箭头  → 切换 MBTI 类型
      罗盘本体点击  → 弹出/收起环形全览
      环形选项点击  → 选中类型 + 收起面板
      令牌点击      → 启卦：粒子 → 飞升 → 打字机 → 卡片
      卡片外点击    → 归真：淡出 → 复位 → 清状态
    入口：init()
============================================================ -->
<script data-module="app">
  /* ═══════════════════════════════════════════════════
     全局状态
     ═══════════════════════════════════════════════════ */
  var currentIndex = MBTI_TYPES.indexOf(DEFAULT_MBTI);
  var isAnimating = false;
  var isCardVisible = false;
  var selectedTokenName = '';
  var selectedMBTI = '';

  /* ═══════════════════════════════════════════════════
     更新罗盘显示
     ═══════════════════════════════════════════════════ */
  function updateDisplay() {
    var display = document.getElementById('mbti-display');
    if (!display) return;

    display.textContent = MBTI_TYPES[currentIndex];
    display.classList.add('text-switching');
    setTimeout(function () {
      display.classList.remove('text-switching');
    }, 150);
  }

  /* ═══════════════════════════════════════════════════
     箭头事件绑定
     ═══════════════════════════════════════════════════ */
  function bindEvents() {
    var leftArrow = document.getElementById('arrow-left');
    var rightArrow = document.getElementById('arrow-right');

    if (leftArrow) {
      leftArrow.addEventListener('click', function () {
        if (isCardVisible) return;
        currentIndex = (currentIndex - 1 + MBTI_TYPES.length) % MBTI_TYPES.length;
        updateDisplay();
      });
    }

    if (rightArrow) {
      rightArrow.addEventListener('click', function () {
        if (isCardVisible) return;
        currentIndex = (currentIndex + 1) % MBTI_TYPES.length;
        updateDisplay();
      });
    }

    /* 键盘左右键 */
    document.addEventListener('keydown', function (e) {
      if (isCardVisible) return;
      if (e.key === 'ArrowLeft') {
        currentIndex = (currentIndex - 1 + MBTI_TYPES.length) % MBTI_TYPES.length;
        updateDisplay();
      } else if (e.key === 'ArrowRight') {
        currentIndex = (currentIndex + 1) % MBTI_TYPES.length;
        updateDisplay();
      }
    });

    /* 令牌点击：启卦 */
    var tokensContainer = document.getElementById('tokens-container');
    if (tokensContainer) {
      tokensContainer.addEventListener('click', function (e) {
        var token = e.target.closest('.token');
        if (!token || isAnimating || token.classList.contains('token--selected')) return;

        isAnimating = true;

        /* 粒子爆发 */
        var rect = token.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        createParticles(cx, cy);

        /* 选中令牌飞升中央 */
        var dx = window.innerWidth / 2 - cx;
        var dy = window.innerHeight / 2 - cy;
        token.style.transform = 'translate(' + dx.toFixed(1) + 'px, ' + dy.toFixed(1) + 'px) scale(1.8)';
        token.classList.add('token--selected');

        /* 其余令牌淡出 */
        var siblings = tokensContainer.querySelectorAll('.token:not([data-token="' + token.getAttribute('data-token') + '"])');
        for (var i = 0; i < siblings.length; i++) {
          siblings[i].classList.add('token--dimmed');
        }

        selectedTokenName = token.getAttribute('data-token');
        selectedMBTI = MBTI_TYPES[currentIndex];

        setTimeout(function () {
          isAnimating = false;
          showReadingCard();
        }, 800);
      });
    }

    /* 归真：点击卡片外空白 */
    document.addEventListener('click', function (e) {
      if (!isCardVisible) return;
      var card = document.getElementById('reading-card');
      if (card && !card.contains(e.target)) {
        resetToGuiZhen();
      }
    });
  }

  /* ═══════════════════════════════════════════════════
     updateUI() 统一刷新（后续步骤扩展）
     ═══════════════════════════════════════════════════ */
  function updateUI() {
    updateDisplay();
  }

  /* ═══════════════════════════════════════════════════
     令牌复位（归真时调用）
     ═══════════════════════════════════════════════════ */
  function resetTokens() {
    isAnimating = false;
    var tokens = document.querySelectorAll('.token');
    for (var i = 0; i < tokens.length; i++) {
      tokens[i].classList.remove('token--selected', 'token--dimmed');
      tokens[i].style.transform = '';
      tokens[i].style.opacity = '';
      tokens[i].style.transition = '';
    }
  }

  /* ═══════════════════════════════════════════════════
     观象：展开卡片 + 打字机 + 底部提示
     ═══════════════════════════════════════════════════ */
  async function showReadingCard() {
    if (isCardVisible) return;
    isCardVisible = true;

    var reading = getReading(selectedMBTI, selectedTokenName);
    if (!reading) {
      isCardVisible = false;
      resetTokens();
      return;
    }

    var els = createReadingCard(selectedMBTI, selectedTokenName, reading);

    /* 选中令牌淡出，让位给卡片 */
    var selectedToken = document.querySelector('.token--selected');
    if (selectedToken) {
      selectedToken.style.transition = 'opacity 0.4s var(--easing)';
      selectedToken.style.opacity = '0';
    }

    els.card.classList.add('reading-card--visible');

    if (reading.time) {
      await typewrite(els.timeEl, reading.time, TYPEWRITER_SPEED_TIME);
    }

    await typewrite(els.textEl, reading.text, TYPEWRITER_SPEED_TEXT);

    els.hintEl.classList.add('card-hint--visible');
  }

  /* ═══════════════════════════════════════════════════
     归真：卡片淡出 → 令牌复位 → 清除历史
     ═══════════════════════════════════════════════════ */
  function resetToGuiZhen() {
    if (!isCardVisible) return;
    isCardVisible = false;

    var card = document.getElementById('reading-card');
    if (card) {
      card.classList.remove('reading-card--visible');
      setTimeout(function () {
        if (card.parentNode) card.remove();
      }, 500);
    }

    resetTokens();
    resetSessionHistory();
  }

  /* ═══════════════════════════════════════════════════
     入口
     ═══════════════════════════════════════════════════ */
  function init() {
    createStarfield();
    renderArrows();   /* 创建 compass-row + 箭头 */
    renderCompass();  /* 罗盘追加到 compass-row */
    renderTokens();   /* 六张符箓令牌 */
    bindEvents();
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
