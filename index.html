<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0D0D14">
<title>云篆</title>
<style>
:root{
  --bg:#0D0D14;
  --brz:#6B3A2A;--brzL:#8B5A3C;--brzD:#3E2418;
  --cin:#C41E3A;
  --ppr:#C8B896;--pprL:#D4C8A8;--pprD:#B8A47E;
  --ink:#3C1010;
  --bam:#F0EAD6;--bamD:#E0D5C0;
  --gld:#9B7E5A;
  --ease:cubic-bezier(.16,1,.3,1)
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:100vw;height:100dvh;overflow:hidden;background:var(--bg);
  font-family:'KaiTi','楷体',serif;color:var(--bam);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;-webkit-user-select:none
}
/* 暖色底光 */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 50% 35% at 40% 25%,rgba(90,55,30,.055),transparent 50%),
    radial-gradient(ellipse 45% 40% at 65% 60%,rgba(70,40,20,.04),transparent 50%),
    radial-gradient(ellipse 70% 25% at 50% 15%,rgba(55,30,15,.03),transparent 55%),
    linear-gradient(180deg,rgba(90,45,20,.025),transparent 35%,transparent 65%,rgba(70,35,20,.03))
}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* 主舞台 */
main{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;padding:8px
}

/* 罗盘行 */
.cr{display:flex;align-items:center;gap:14px}

/* 箭头 */
.ar{
  width:52px;height:52px;flex-shrink:0;
  display:grid;place-items:center;
  font-size:30px;color:var(--brz);cursor:pointer;
  transition:color .15s
}
.ar:active{color:var(--brzL)}

/* 罗盘 */
.co{
  position:relative;width:240px;height:240px;flex-shrink:0;
  will-change:transform;
  animation:coS 120s linear infinite
}
@keyframes coS{to{transform:rotate(360deg)}}
.co-r{
  position:absolute;border-radius:50%;top:50%;left:50%;pointer-events:none;
  will-change:transform;transform:translateZ(0);backface-visibility:hidden
}
.co-r--o{
  width:100%;height:100%;margin:-50% 0 0 -50%;
  border:2.5px solid var(--brz);
  box-shadow:0 0 24px rgba(155,110,75,.15),inset 0 0 36px rgba(155,110,75,.06);
  animation:rRo 90s linear infinite
}
.co-r--m{
  width:86%;height:86%;margin:-43% 0 0 -43%;
  border:1px dashed rgba(139,90,60,.4);
  animation:rRi 70s linear infinite
}
.co-r--i{
  width:73%;height:73%;margin:-36.5% 0 0 -36.5%;
  border:1px solid rgba(107,58,42,.35);
  animation:rRo 110s linear infinite
}
@keyframes rRo{to{transform:translateZ(0) rotate(-360deg)}}
@keyframes rRi{to{transform:translateZ(0) rotate(360deg)}}

/* 天池 */
.co-c{
  position:absolute;top:50%;left:50%;width:56%;height:56%;margin:-28% 0 0 -28%;
  border-radius:50%;
  background:radial-gradient(circle at 45% 40%,#201a18,var(--bg) 70%);
  border:1.5px solid rgba(107,58,42,.3);
  display:grid;place-items:center;
  font-size:32px;letter-spacing:4px;color:var(--brzL);
  animation:coC 120s linear infinite;
  text-shadow:0 0 10px rgba(139,90,60,.2);
  cursor:pointer;z-index:2
}
@keyframes coC{to{transform:rotate(-360deg)}}
.co-c.f{animation:coCF .15s var(--ease)}
@keyframes coCF{50%{transform:rotate(-360deg) scale(1.12)}}

/* 心笺 */
.tc{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.tk{
  width:56px;height:130px;
  background:
    radial-gradient(ellipse at 0% 0%,rgba(80,55,25,.16),transparent 35%),
    radial-gradient(ellipse at 100% 0%,rgba(70,50,20,.12),transparent 30%),
    radial-gradient(ellipse at 0% 100%,rgba(70,50,20,.1),transparent 32%),
    radial-gradient(ellipse at 100% 100%,rgba(75,52,22,.14),transparent 28%),
    repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(100,80,50,.018) 4px,rgba(100,80,50,.018) 5px),
    linear-gradient(180deg,var(--pprD),var(--ppr) 30%,var(--pprL) 50%,var(--ppr) 70%,var(--pprD));
  border:1px solid rgba(70,50,20,.18);
  box-shadow:0 3px 16px rgba(0,0,0,.35),inset 0 0 36px rgba(70,50,20,.03);
  display:grid;place-items:center;
  writing-mode:vertical-rl;text-orientation:upright;
  font-size:30px;font-weight:bold;color:var(--ink);letter-spacing:6px;
  cursor:pointer;
  animation:tkF var(--fd) ease-in-out infinite;
  animation-delay:var(--fdel);
  transition:transform .35s var(--ease),opacity .35s var(--ease),box-shadow .25s;
  text-shadow:0 0 3px rgba(60,16,16,.4),0 0 10px rgba(60,16,16,.12)
}
@keyframes tkF{0%,100%{transform:translateY(0)}50%{transform:translateY(var(--fa))}}
.tk:active{color:var(--cin);text-shadow:0 0 14px rgba(196,30,58,.4),0 0 28px rgba(196,30,58,.18);box-shadow:0 6px 24px rgba(196,30,58,.1),0 2px 8px rgba(0,0,0,.4);border-color:rgba(196,30,58,.25)}
.tk--s{animation:none!important;z-index:50;transition:transform .8s var(--ease),opacity .8s var(--ease)}
.tk--d{animation:none!important;opacity:0!important;pointer-events:none;transition:opacity .6s var(--ease)}

/* 粒子 */
.prt{
  position:fixed;width:4px;height:4px;border-radius:50%;z-index:100;pointer-events:none;
  background:var(--gld);box-shadow:0 0 6px rgba(155,126,90,.45);
  animation:prtF .8s var(--ease) forwards
}
@keyframes prtF{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}}

/* 竹简卡片 */
.rd{
  position:fixed;top:50%;left:50%;z-index:60;
  transform:translate(-50%,-50%) scale(.92);
  width:min(90vw,480px);max-height:75vh;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 8px,rgba(200,180,150,.05) 8px,rgba(200,180,150,.05) 9px),
    linear-gradient(180deg,var(--bam),var(--bam) 40%,var(--bamD));
  border:2px solid rgba(139,90,60,.22);border-radius:3px;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.2),inset 0 0 50px rgba(180,120,70,.04);
  padding:24px 20px 16px;display:flex;flex-direction:column;gap:12px;
  opacity:0;pointer-events:none;overflow-y:auto;
  font-family:'SimSun','宋体',serif;
  transition:opacity .45s var(--ease),transform .5s var(--ease)
}
.rd--v{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.rd-tg{font-size:20px;color:var(--brz);letter-spacing:3px;text-align:center;font-weight:bold}
.rd-tm{font-size:13px;color:var(--brzD);text-align:center;opacity:.6}
.rd-tx{font-size:16px;color:var(--ink);line-height:1.9;text-align:justify}
.rd-ht{font-size:12px;color:var(--brz);text-align:center;opacity:0;margin-top:8px;padding-top:10px;border-top:1px solid rgba(139,90,60,.1)}
.rd-ht--v{opacity:.45;transition:opacity .6s}

/* 环形面板 */
.rp{position:fixed;inset:0;z-index:55;display:none}
.rp--v{display:block}
.rp-bd{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.rp-o{
  position:absolute;transform:translate(-50%,-50%);
  font-size:13px;color:var(--brz);letter-spacing:2px;white-space:nowrap;
  padding:6px 12px;border-radius:12px;
  background:rgba(13,13,20,.85);border:1px solid rgba(107,58,42,.22);
  opacity:0;cursor:pointer;
  animation:rpA .4s var(--ease) forwards;animation-delay:var(--rd)
}
@keyframes rpA{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.rp-o--a{color:var(--cin);border-color:rgba(196,30,58,.35);text-shadow:0 0 8px rgba(196,30,58,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<main id="m">
  <div class="cr" id="cr">
    <div class="ar" id="al">◂</div>
    <div class="co" id="co">
      <div class="co-r co-r--o"></div>
      <div class="co-r co-r--m"></div>
      <div class="co-r co-r--i"></div>
      <div class="co-c" id="cc">INFP</div>
    </div>
    <div class="ar" id="ar">▸</div>
  </div>
  <div class="tc" id="tc"></div>
</main>
<script>
/* ═══════════════════════════════════════
   云篆 v3 · 从零重写 · 420行
   Canvas星图 / 暖纸纹理 / 极简暗色
   ═══════════════════════════════════════ */

var C=['INFP','INFJ','INTJ','ENFP','ENFJ','ENTJ','ESFP','ESFJ','ESTP','ESTJ','ISFP','ISFJ','ISTP','ISTJ','INTP','ENTP'];
var T=['迷途','坎','执','散','渊','生'];
var TAGS={INFP:'逍遥散人',INTJ:'弈天者',INFJ:'渡人舟',ENFP:'逐风客',ENFJ:'掌灯人',ENTJ:'定海针',ESFP:'弄潮儿',ESFJ:'守灶人',ESTP:'破阵子',ESTJ:'执尺人',ISFP:'抱琴客',ISFJ:'系铃人',ISTP:'淬剑客',ISTJ:'守夜人',INTP:'观星客',ENTP:'纵火者'};
var TW=45,PN=20,TA=[-5,5];

/* 文案 */
var D={INFP:{
  迷途:[{a:'雾中有路，只是眼看不见。闭上眼，用脚底去听——听那最细的根须如何选择泥土的方向。',b:'卯时初刻 · 晨露未晞'},{a:'迷途本身或许就是归途。何必急着走出这片森林？林深处，才有别人不曾见过的月光。',b:'亥时三刻 · 月满西楼'}],
  坎:[{a:'水遇石则绕，遇崖则落。不是石头在挡你——是水还不知道自己要去哪。',b:'辰时二刻 · 云开雾散'},{a:'低处的河流最清楚高山的重量。每道坎都是山在跟你说话。',b:'申时初刻 · 日影西斜'}],
  执:[{a:'手握得越紧，沙子流得越快。松开看看——掌心还有天空。',b:'午时正刻 · 烈日当空'},{a:'执着是一根绳索，一头系着你，一头系着幻影。剪断哪头更疼？',b:'子时三刻 · 夜深人静'}],
  散:[{a:'云散了，山还在。你以为失去的，不过是被风吹散的形状。',b:'酉时二刻 · 归鸟入林'},{a:'蒲公英从不规划自己的落点，但每一片都找到了泥土。',b:'巳时初刻 · 万物生发'}],
  渊:[{a:'深渊并不吞噬光——它只是让光学会沉默。在沉默里，你才能听见自己的回声。',b:'丑时二刻 · 万籁俱寂'},{a:'站在渊边的人，比站在山顶的人更懂什么是高度。',b:'戌时初刻 · 暮色四合'}],
  生:[{a:'种子在破土之前，谁也不知道它是一棵树还是一朵花。生长本身就是答案。',b:'寅时三刻 · 黎明将至'},{a:'活着不是奔跑，是像竹子一样——一节一节地往上，每节都留下一道痕。',b:'未时初刻 · 蝉鸣如雨'}]
},INTJ:{
  迷途:[{a:'迷途是棋局的一部分。真正的大师永远不会走丢——他们只是在计算下一手的位置。',b:'卯时初刻 · 晨露未晞'},{a:'方向比速度重要。站在原地看星图，胜过蒙头狂奔三百里。',b:'子时正刻 · 星河在天'}],
  坎:[{a:'障碍是自然生成的过滤器。跨不过去的，原本就不属于你的路径。',b:'辰时三刻 · 云开雾散'},{a:'把坎当成台阶。踩上去，你的视野就会高于原来的平面。',b:'申时二刻 · 日影西斜'}],
  执:[{a:'执着是一柄双刃剑。用它开路可以，但别让它成为你唯一握住的武器。',b:'午时初刻 · 烈日当空'},{a:'放手不是因为放弃了目标，而是找到了更优的策略。',b:'丑时初刻 · 万籁俱寂'}],
  散:[{a:'分散是集中前的蓄力。拉弓越满，箭越快。',b:'酉时初刻 · 暮色初临'},{a:'你以为在散落，其实在布局。有些棋要到终局才看得懂。',b:'巳时二刻 · 万物生发'}],
  渊:[{a:'深渊是最诚实的镜子。它不赞美你，不贬低你，只让你看见自己本来的模样。',b:'戌时三刻 · 夜色渐浓'},{a:'凝视深渊是危险的——但闭着眼睛走路更危险。',b:'寅时初刻 · 黎明将至'}],
  生:[{a:'生长不是加法，是乘法。每一个决策都在复利。',b:'辰时初刻 · 晨光熹微'},{a:'生命最精妙的算法不是"更多"，而是"恰好"。',b:'未时三刻 · 蝉鸣渐息'}]
},INFJ:{
  迷途:[{a:'迷路的人往往在找别人。其实路一直在你心里，只是你还不敢走。',b:'卯时三刻 · 晨露未晞'},{a:'别怕走错。每一条路走到尽头，你都会发现自己。',b:'亥时初刻 · 月满西楼'}],
  坎:[{a:'河水从不停下来问"为什么有石头"。它绕过，继续流淌，石头自然圆润。',b:'辰时初刻 · 云开见日'},{a:'每一道坎都是别人的故事在你生命里的回声。听完，就可以翻篇了。',b:'申时三刻 · 日影西斜'}],
  执:[{a:'你执着的是那个人，还是被那个人看见的自己？',b:'午时二刻 · 烈日当空'},{a:'松开吧。掌心的温度比握住的沙更真实。',b:'子时初刻 · 夜深人静'}],
  散:[{a:'散落不是破碎。是你把光分给了太多的角落，忘了留一盏给自己。',b:'酉时三刻 · 归鸟入林'},{a:'散开的花瓣会变成泥土，泥土会长出新的花。没有什么是真的失去。',b:'巳时初刻 · 万物生发'}],
  渊:[{a:'你害怕的不是深渊，是站在深渊边时心里那个回音——它说的都是实话。',b:'丑时三刻 · 万籁俱寂'},{a:'深渊从不会主动拉人下去。是人在渊边站得太久，忘记身后还有路。',b:'戌时二刻 · 夜色渐浓'}],
  生:[{a:'你生来不是为了照亮所有人。一盏灯点久了也会烫手。先温暖自己。',b:'寅时二刻 · 黎明将至'},{a:'生命最温柔的奇迹不是开花，是愿意在黑暗的泥土里等。',b:'未时二刻 · 蝉鸣如雨'}]
},ENFP:{
  迷途:[{a:'迷路了？太好了！未知是冒险的另一个名字。',b:'卯时二刻 · 晨露未晞'},{a:'没有地图的路才是你的路。别人走过的，只是风景。',b:'亥时二刻 · 月色如水'}],
  坎:[{a:'坎是惊喜的门槛——跨过去之前你永远不知道另一边有什么。',b:'辰时初刻 · 云开见日'},{a:'石头挡路？踩上去，看得更远。',b:'申时初刻 · 日影西斜'}],
  执:[{a:'你执着的是热情本身。但当风变了方向，帆也要调整。',b:'午时三刻 · 烈日当空'},{a:'放下一个执念，才能拿起一百个新的可能。',b:'子时二刻 · 夜深人静'}],
  散:[{a:'你是烟花——散开的每一点都是光。不需要收拢成一个形状。',b:'酉时初刻 · 暮色初临'},{a:'散落不是迷失，是播种。你走过的每一处都会开花。',b:'巳时三刻 · 万物生发'}],
  渊:[{a:'深渊只是很深很深的天空。换个角度看，你在飞翔。',b:'丑时初刻 · 万籁俱寂'},{a:'别在渊边发呆——扔一颗石头下去，听听回声有多深。那才是你。',b:'戌时初刻 · 暮色四合'}],
  生:[{a:'活着就是不断燃烧。烧完了？没关系，太阳明天还会升起。',b:'寅时初刻 · 黎明将至'},{a:'生命不是填空题，是涂鸦——想画什么就画什么。',b:'未时初刻 · 蝉鸣初起'}]
}};
var H={};
function gR(m,tk){
  var td=D[m];if(!td)return null;
  var e=td[tk];if(!e||!e.length)return null;
  var k=m+'_'+tk;if(!H[k])H[k]=[];
  var s=H[k],av=e.filter(function(_,i){return s.indexOf(i)===-1});
  if(!av.length){H[k]=[];av=e.slice()}
  var p=av[Math.floor(Math.random()*av.length)];
  s.push(e.indexOf(p));return p;
}

/* ═══ Canvas星图 ═══ */
!function(){
  var cv=document.getElementById('c'),x=cv.getContext('2d'),W,H,cx,cy;
  function R(){W=cv.width=innerWidth;H=cv.height=innerHeight;cx=W/2;cy=H/2}
  R();addEventListener('resize',R);
  function S(b){return W<=480?Math.ceil(b*.2):W<=768?Math.ceil(b*.35):b}
  var L=[{n:380,v:.015,r:350,c:[195,185,170],a:.18},{n:180,v:.025,r:450,c:[200,190,175],a:.26},{n:90,v:.038,r:550,c:[205,195,180],a:.34},{n:30,v:.050,r:650,c:[215,205,190],a:.22}];
  var st=[];
  L.forEach(function(l){for(var i=0,N=S(l.n);i<N;i++)st.push({A:Math.random()*Math.PI*2,R:100+Math.random()*(l.r-100),V:l.v*(.6+Math.random()*.8),Z:.6+Math.random()*1.8,C:l.c,O:l.a*(.5+Math.random())})});
  function dr(t){
    x.fillStyle='#0D0D14';x.fillRect(0,0,W,H);
    var g=x.createRadialGradient(cx*.5,cy*.65,0,cx*.5,cy*.65,W*.45);
    g.addColorStop(0,'rgba(60,35,20,.06)');g.addColorStop(1,'rgba(60,35,20,0)');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    st.forEach(function(s){s.A+=s.V*.001;var sx=cx+Math.cos(s.A)*s.R,sy=cy+Math.sin(s.A)*s.R;if(sx<-50||sx>W+50||sy<-50||sy>H+50)return;x.fillStyle='rgba('+s.C[0]+','+s.C[1]+','+s.C[2]+','+s.O.toFixed(2)+')';x.beginPath();x.arc(sx,sy,s.Z,0,Math.PI*2);x.fill()});
    if(W>768)for(var i=0;i<5;i++){var p=.5+.5*Math.sin(t*.001*(2*Math.PI/(2.5+Math.random()*3))+Math.random()*Math.PI*2);x.fillStyle='rgba(220,210,195,'+(.4*p).toFixed(2)+')';x.beginPath();x.arc(Math.random()*W,Math.random()*H,1.5+Math.random()*2,0,Math.PI*2);x.fill()}
    requestAnimationFrame(dr)
  }
  requestAnimationFrame(dr)
}();

/* ═══ 渲染 ═══ */
var tkC=document.getElementById('tc');
var ds=[3.2,3.6,3,3.8,3.3,3.5],dl=[0,.5,1,1.5,.3,.8];
T.forEach(function(n,i){
  var e=document.createElement('div');e.className='tk';e.setAttribute('data-tk',n);e.textContent=n;
  e.style.setProperty('--fd',ds[i]+'s');e.style.setProperty('--fdel',dl[i]+'s');
  e.style.setProperty('--fa',((TA[0]+Math.random()*(TA[1]-TA[0]))|0)+'px');
  tkC.appendChild(e)
});

/* 环形面板 */
var RP=null,rv=false;
function bR(){if(RP)return;RP=document.createElement('div');RP.className='rp';var b=document.createElement('div');b.className='rp-bd';b.addEventListener('click',hR);RP.appendChild(b);document.body.appendChild(RP)}
function sR(){
  bR();var r=document.getElementById('co').getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,R=r.width*.58;
  RP.querySelectorAll('.rp-o').forEach(function(o){o.remove()});
