name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Copy web assets to android assets
        run: |
          mkdir -p android/app/src/main/assets/public
          cp index.html manifest.json sw.js icon-*.svg android/app/src/main/assets/public/

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yunzhuan-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
