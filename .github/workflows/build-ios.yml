name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync web assets
        run: mkdir -p www && cp index.html manifest.json sw.js icon-*.svg www/

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r yunzhuan-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: yunzhuan-ios-unsigned
          path: yunzhuan-unsigned.ipa
